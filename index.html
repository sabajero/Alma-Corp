<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALMA-CORP — Integrated Systems. Optimized Outcomes.</title>
  <meta name="description"
    content="ALMA-CORP builds systems that resolve complexity at any scale. ALMA-1 processes what others cannot perceive." />

  <!-- CSS — load tokens first, then base, then components -->
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/header.css" />
  <link rel="stylesheet" href="css/hero.css" />
  <link rel="stylesheet" href="css/cards.css" />
  <link rel="stylesheet" href="css/cta.css" />
  <link rel="stylesheet" href="css/footer.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>

<body>

  <!-- ══════════════════════════════════════════════════════
       HEADER — edit appearance in css/header.css
       ══════════════════════════════════════════════════════ -->
  <header class="header" id="site-header">
    <div class="header-inner container">

      <!-- Title -->
      <a href="index.html" class="logo" aria-label="ALMA-CORP home">
        <span class="logo-text">Alma</span>
      </a>

      <!-- Contact Us Button -->
      <a href="mailto:info@alma-corp.de" class="header-contact-btn">Be part of</a>

    </div>
  </header>



  <div class="bg-gradient"></div>

  <main class="main-login-container">
    <div class="login-box">
      <img src="logo alma.png" alt="Alma Logo" class="login-logo">
      <form class="login-form" onsubmit="event.preventDefault();">
        <input type="text" class="login-input" placeholder="ACCESS ID" aria-label="Access ID">
        <input type="password" class="login-input" placeholder="CREDENTIAL" aria-label="Credential">
        <button type="submit" class="login-button">INITIALIZE</button>
      </form>
      <div class="version-number">SYS.VER // 4.9.21.X</div>
    </div>
  </main>

  <div class="bottom-corner-images">
    <img src="L1.png" alt="L1" class="corner-img">
    <img src="SIGNAL.png" alt="Signal" class="corner-img">
    <img src="core .png" alt="Core" class="corner-img">
  </div>

  <script src="js/main.js"></script>
</body>

</html>
